name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd ~/Paper-Portfolio

            echo "=== [1/5] Prune Docker to free disk space ==="
            sudo docker system prune -af || true
            df -h /

            echo "=== [2/5] Fix any untracked files conflicting with git ==="
            rm -f .dockerignore
            sudo chown -R ubuntu:ubuntu .git
            git stash clear 2>/dev/null || true

            echo "=== [3/5] Git pull ==="
            git pull

            echo "=== [4/5] Build and start containers ==="
            sudo docker compose down --remove-orphans 2>&1 || true
            sudo docker rm -f paper-portfolio-paper-portfolio-1 2>&1 || true
            sudo docker compose up -d --build 2>&1

            echo "=== [5/5] Status and logs ==="
            sudo docker compose ps
            sudo docker compose logs --tail=20
