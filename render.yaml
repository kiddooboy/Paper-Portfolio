services:
  - type: web
    name: paper-portfolio
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    # Persistent disk so the SQLite file survives redeploys.
    # NOTE: persistent disks require a paid plan (Starter+). On Free,
    # the disk is ephemeral and the DB will reset on every redeploy.
    disk:
      name: papertrading-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/papertrading.db

      # ── Firebase / Google sign-in ──
      # Paste the full service account JSON from Firebase Console →
      # Project Settings → Service Accounts → Generate new private key.
      # Keep it as a single-line JSON string (do NOT expand \n to real newlines).
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

      # ── Admin account bootstrap ──
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false

      # ── SMTP (for forgot-password OTP emails) ──
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
