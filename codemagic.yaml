# Codemagic CI — builds the Paper Portfolio iOS app on a cloud Mac (no Mac needed locally).
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
#
# ONE-TIME SETUP in the Codemagic web UI (see IOS.md for the walkthrough):
#   1. Connect this GitHub repo.
#   2. Add an "App Store Connect API key" integration (needs the $99 Apple
#      Developer Program). Name it exactly: PaperPortfolioAppStoreKey
#   3. Register the iOS app in Firebase (bundle id in.paperportfolio.app),
#      download GoogleService-Info.plist, and commit it at:
#         client/ios-config/GoogleService-Info.plist
#      (public Firebase client config — safe to commit, like google-services.json)

workflows:
  ios-release:
    name: Paper Portfolio iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PaperPortfolioAppStoreKey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: in.paperportfolio.app
      vars:
        VITE_API_URL: "https://paperportfolio.in"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "in.paperportfolio.app"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install web dependencies & build the React app
        script: |
          cd client
          npm ci
          npm run build

      - name: Generate the iOS native project & sync web assets
        script: |
          cd client
          # ios/ is generated on the Mac runner (it can't be created on Windows)
          [ -d ios ] || npx cap add ios
          npx cap sync ios

      - name: Add Firebase config (GoogleService-Info.plist)
        script: |
          cd client
          if [ -f ios-config/GoogleService-Info.plist ]; then
            cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
            echo "GoogleService-Info.plist copied."
          else
            echo "WARNING: client/ios-config/GoogleService-Info.plist not found — Google sign-in will not work."
          fi

      - name: Set up code signing profiles
        script: |
          xcode-project use-profiles

      - name: Set build number from App Store Connect
        script: |
          cd client/ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      - name: Build the signed IPA
        script: |
          cd client/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - client/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups:           # uncomment + name a TestFlight group to auto-distribute
        #   - Internal Testers

  # Optional: a no-signing smoke build to confirm the iOS app COMPILES
  # before you have an Apple Developer account. Builds for the simulator only
  # (not installable on a real device / TestFlight).
  ios-compile-check:
    name: Paper Portfolio iOS (compile check, no signing)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      vars:
        VITE_API_URL: "https://paperportfolio.in"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build web + iOS project
        script: |
          cd client
          npm ci
          npm run build
          [ -d ios ] || npx cap add ios
          npx cap sync ios
      - name: Compile for the simulator (no code signing)
        script: |
          cd client/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log
